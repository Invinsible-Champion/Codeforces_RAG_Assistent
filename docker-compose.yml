version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cf_rag_postgres
    environment:
      POSTGRES_USER: codeforces
      POSTGRES_PASSWORD: codeforces_pass
      POSTGRES_DB: codeforces_rag
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeforces -d codeforces_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
